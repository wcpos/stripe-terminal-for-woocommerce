name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check if version has changed
        id: check_version
        run: |
          VERSION=$(grep -oP "Version:\s*\K\d+(\.\d+)*" stripe-terminal-for-woocommerce.php)
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          git fetch --prune --unshallow
          if git tag | grep -q "v$VERSION"; then
            echo "Version has not changed. Skipping release..."
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version has changed. Creating new release..."
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install composer dependencies
        if: steps.check_version.outputs.release == 'true'
        run: composer install --no-dev

      - name: Install and Build payment-frontend
        if: steps.check_version.outputs.release == 'true'
        working-directory: packages/payment-frontend
        run: |
          npm install
          npm run build

      - name: Install and Build blocks-payment
        if: steps.check_version.outputs.release == 'true'
        working-directory: packages/blocks-payment
        run: |
          npm ci
          npm run build

      - name: Extract release notes from CHANGELOG.md
        if: steps.check_version.outputs.release == 'true'
        run: |
          awk -v ver="$VERSION" '
            /^## / { if (found) exit; if (index($0, "## " ver " ") == 1 || $0 == "## " ver) found=1; next }
            found { print }
          ' CHANGELOG.md > "$RUNNER_TEMP/release-notes.md"
          if [ ! -s "$RUNNER_TEMP/release-notes.md" ]; then
            echo "No CHANGELOG.md entry found for $VERSION; using placeholder notes."
            echo "Release v$VERSION" > "$RUNNER_TEMP/release-notes.md"
          fi
          cat "$RUNNER_TEMP/release-notes.md"

      - name: Create Release
        if: steps.check_version.outputs.release == 'true'
        run: gh release create "v$VERSION" --title "Release v$VERSION" --notes-file "$RUNNER_TEMP/release-notes.md"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and upload ZIP
        if: steps.check_version.outputs.release == 'true'
        run: |
          rm -rf packages # Remove the packages folder
          zip -r stripe-terminal-for-woocommerce.zip . -x "*.git*"
          gh release upload v${{ env.VERSION }} stripe-terminal-for-woocommerce.zip --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
